name: Slater Gitea CI
run-name: ${{ gitea.actor }} runs CI for slater
on: 
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: gitea.abelprime.click/abel/cargo-ci:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run unit tests
        run: cargo test
