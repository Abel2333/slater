<section class="intro">
  <h2>Posts</h2>
  <p>Recent writing and notes.</p>
</section>

<ul class="post-list">
  {% for post in posts %}
  <li class="post-list-item">
    <a class="post-link" href="{{ post.url }}">
      <span class="post-title">{{ post.title }}</span>
      {% if post.date %}
      <span class="post-date">{{ post.date }}</span>
      {% endif %}
    </a>
    {% if post.summary %}
    <p class="post-summary">{{ post.summary }}</p>
    {% endif %}
  </li>
  {% endfor %}
</ul>
