<section class="intro">
  <p class="intro-kicker">Journal</p>
  <h2 class="intro-title">Posts</h2>
  <p class="intro-text">Notes on building, writing, and making things carefully.</p>
</section>

<ul class="post-list">
  {% for post in posts %}
  <li class="post-list-item">
    <a class="post-link" href="{{ post.url }}">
      <div class="post-main">
        <h3>{{ post.title }}</h3>
        {% if post.summary %}
        <p class="post-summary">{{ post.summary }}</p>
        {% endif %}
      </div>
      {% if post.date %}
      <p class="post-date">{{ post.date }}</p>
      {% endif %}
    </a>
  </li>
  {% endfor %}
</ul>
