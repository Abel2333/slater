<section class="hero">
  <h2>Posts</h2>
  <p>Welcome to your new site.</p>
</section>

<ul class="post-list">
  {% for post in posts %}
  <li class="post-list-item">
    <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
    {% if post.summary %}
    <p>{{ post.summary }}</p>
    {% endif %}
  </li>
  {% endfor %}
</ul>
